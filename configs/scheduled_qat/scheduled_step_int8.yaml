method: scheduled_qat
target_bits: 8

model:
  name: "HuggingFaceTB/SmolLM2-1.7B"
  cache_dir: "models/base/"

data:
  train_dataset: "wikitext-103-raw-v1"
  eval_dataset: "wikitext-103-raw-v1"
  train_split: "train"
  eval_split: "test"
  seq_length: 2048

training:
  epochs: 3
  batch_size: 8
  gradient_accumulation_steps: 4   # effective batch size = 32
  learning_rate: 5e-5
  optimizer: adamw
  weight_decay: 0.01
  warmup_steps: 500
  lr_scheduler: cosine

# Step schedule: hard precision drops at defined transition epochs with flat plateaus between.
# The model trains at each bit-width level until the next transition epoch.
schedule:
  type: step
  warmup_epochs: 0.5               # first half-epoch trains at full FP32 precision
  start_bits: 32
  target_bits: 8
  transitions:
    - { epoch: 0.5, bits: 16 }     # drop to FP16 at epoch 0.5
    - { epoch: 1.5, bits: 8 }      # drop to INT8 at epoch 1.5
  stabilization_epochs: 0.5        # last half-epoch fine-tunes at INT8 before stopping

quantize_config:
  scheme: symmetric
  granularity: per_channel
  exclude_layers:
    - lm_head
    - embed_tokens

evaluation:
  primary_metrics: [perplexity, kl_divergence]
  secondary_benchmarks: [mmlu, hellaswag, arc_challenge, piqa, gsm8k]
  track_answer_flips: true

export:
  format: gguf
  output_dir: "models/gguf/"

logging:
  save_every_steps: 5000
  eval_every_steps: 2500
  log_dir: "results/logs/scheduled_step_int8/"
